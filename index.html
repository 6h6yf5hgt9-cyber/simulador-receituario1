<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simulador de Receituário (Modelo)</title>

  <!-- jsPDF (gera o PDF diretamente, sem “print”) -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    :root{
      --bg:#0b0c10;
      --ink:#e9edf6;
      --muted:#a7b0c3;
      --paper:#ffffff;
      --paperInk:#111;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      background: radial-gradient(1200px 700px at 20% -10%, rgba(124,58,237,.25), transparent 60%),
                  radial-gradient(900px 600px at 110% 20%, rgba(59,130,246,.18), transparent 55%),
                  var(--bg);
      color:var(--ink);
    }

    .wrap{max-width:1100px; margin:0 auto; padding:24px;}
    .top{display:flex; gap:16px; align-items:flex-start; justify-content:space-between; margin-bottom:16px;}
    .brand{display:flex; gap:12px; align-items:center;}
    .logoBadge{
      width:44px; height:44px; border-radius:12px;
      background: linear-gradient(135deg, rgba(124,58,237,.9), rgba(59,130,246,.75));
      display:grid; place-items:center;
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      user-select:none;
    }
    .logoBadge span{font-weight:800; letter-spacing:.5px; font-size:14px;}
    h1{margin:0; font-size:18px; line-height:1.2;}
    .sub{margin:4px 0 0 0; color:var(--muted); font-size:13px; max-width:660px;}

    .actions{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .btn{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color:var(--ink);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
      letter-spacing:.2px;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
      user-select:none;
      display:inline-flex; gap:8px; align-items:center;
      white-space:nowrap;
    }
    .btn:hover{background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.16);}
    .btn:active{transform: translateY(1px);}
    .btn.primary{
      background: linear-gradient(135deg, rgba(124,58,237,.95), rgba(59,130,246,.85));
      border-color: rgba(255,255,255,.14);
    }

    .grid{display:grid; grid-template-columns: 1.05fr .95fr; gap:14px;}
    @media (max-width: 980px){ .grid{grid-template-columns:1fr;} }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:14px;
      box-shadow: 0 14px 35px rgba(0,0,0,.25);
    }
    .card h2{margin:0 0 10px 0; font-size:14px; letter-spacing:.2px;}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media (max-width: 600px){ .row{grid-template-columns:1fr;} }

    label{display:block; font-size:12px; color:var(--muted); margin:8px 0 6px;}
    input, textarea{
      width:100%;
      padding:10px 11px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      color: var(--ink);
      outline: none;
    }
    textarea{min-height:82px; resize:vertical;}
    input::placeholder, textarea::placeholder{color: rgba(167,176,195,.65);}

    .seg{display:flex; gap:10px; flex-wrap:wrap; margin-top:8px;}
    .pill{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      padding:8px 10px;
      border-radius:999px;
      cursor:pointer;
      user-select:none;
      font-weight:700;
      font-size:12px;
    }
    .pill input{display:none}
    .pill.active{background: rgba(124,58,237,.25); border-color: rgba(124,58,237,.55);}

    .medList{display:flex; flex-direction:column; gap:10px;}
    .medItem{
      background: rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.10);
      border-radius:16px;
      padding:12px;
    }
    .medTop{display:flex; gap:10px; align-items:center; justify-content:space-between;}
    .medIdx{
      font-weight:900;
      background: rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.10);
      width:34px; height:34px; border-radius:12px;
      display:grid; place-items:center;
      flex: 0 0 auto;
    }
    .medRemove{
      border:none;
      background: rgba(239,68,68,.14);
      color: rgba(255,255,255,.92);
      padding:8px 10px;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
    }
    .medRemove:hover{background: rgba(239,68,68,.18);}
    .mutedSmall{font-size:12px; color:var(--muted); margin-top:10px; line-height:1.35;}
    .addRow{margin-top:10px; display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap;}
    .btnAdd{
      border:1px dashed rgba(255,255,255,.18);
      background: rgba(255,255,255,.04);
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
      color: var(--ink);
    }
    .btnAdd:hover{background: rgba(255,255,255,.07);}

    /* Preview (abre em outra aba) */
    .paper{
      width: 210mm;
      min-height: 297mm;
      background: var(--paper);
      color: var(--paperInk);
      margin: 0 auto;
      padding: 16mm 18mm 14mm 18mm;
      font-family: Arial, Helvetica, sans-serif;
    }
    .pageBreak{page-break-after: always;}
    .rxTopRight{font-weight:700; font-size:12px; text-align:right; margin-top:2mm;}
    .rxTitle{font-size:22px; font-weight:700; text-align:center; margin:22mm 0 10mm;}
    .rxPatient{font-size:14px; line-height:1.35; margin:0 0 12mm 0;}
    .rxUso{color:#666; font-size:14px; margin:0 0 6mm 0;}
    .rxMed{margin:0 0 10mm 0;}
    .rxMedLine{display:flex; gap:10px; justify-content:space-between; align-items:flex-end; font-size:16px; font-weight:700;}
    .rxMedQty{font-weight:400;}
    .rxPos{font-size:16px; margin:6mm 0 0 0; line-height:1.25;}
    .rxSignLine{border-top:1px solid #111; margin:30mm 0 6mm;}
    .rxSigner{font-size:16px; text-align:center;}
    .rxDate{font-size:16px; text-align:center; margin-top:2mm;}

    .rxBox{margin-top:10mm; border:1px solid #111;}
    .rxBoxHead{display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid #111; font-weight:700; text-align:center; padding:6px 0;}
    .rxBoxBody{display:grid; grid-template-columns:1fr 1fr; min-height:46mm;}
    .rxBoxCol{padding:8px 10px; border-right:1px solid #111;}
    .rxBoxCol:last-child{border-right:none;}
    .rxField{font-size:12px; margin:8px 0;}
    .rxLine{border-bottom:1px solid #111; display:inline-block; width:80%; height:10px; vertical-align:bottom;}
    .rxLineShort{width:35%}
    .rxFooterFarm{position:relative; min-height:46mm;}
    .rxFarmSign{position:absolute; left:10px; right:10px; bottom:8px; display:flex; justify-content:space-between; font-size:10px; gap:10px;}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logoBadge" title="UNICSUL"><span>UNI</span></div>
        <div>
          <h1>Simulador de Receituário (modelo igual ao anexo)</h1>
          <p class="sub">Aqui só tem <b>Visualizar</b> e <b>Salvar PDF</b>. Nada de Validar/Salvar/rascunho.</p>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="btnPreview">👀 Visualizar</button>
        <button class="btn primary" id="btnPdf">📄 Salvar PDF</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Dados do paciente</h2>

        <label for="paciente">Nome do paciente</label>
        <input id="paciente" placeholder="Ex.: Bianca Imperio" />

        <label for="end1">Endereço (linha 1)</label>
        <input id="end1" placeholder="Ex.: Avenida Capuava, 100" />

        <label for="end2">Endereço (linha 2)</label>
        <input id="end2" placeholder="Ex.: Vila Homero Thon - Santo André - SP, 09111-000" />

        <label>Uso</label>
        <div class="seg" id="usoSeg">
          <label class="pill active"><input type="radio" name="uso" value="Uso Interno" checked>Uso Interno</label>
          <label class="pill"><input type="radio" name="uso" value="Uso Externo">Uso Externo</label>
        </div>

        <div class="row" style="margin-top:10px;">
          <div>
            <label for="assinatura">Assinatura (nome do aluno)</label>
            <input id="assinatura" placeholder="Ex.: Fernando Henrique Martins" />
          </div>
          <div>
            <label for="data">Data</label>
            <input id="data" placeholder="dd/mm/aaaa" />
          </div>
        </div>

        <p class="mutedSmall">A posologia sai do jeito que o aluno escreve (sem eu abreviar nada).</p>
      </div>

      <div class="card">
        <h2>Medicamentos</h2>
        <div class="medList" id="medList"></div>

        <div class="addRow">
          <button class="btnAdd" id="btnAddMed">＋ Adicionar medicamento</button>
          <span class="mutedSmall" style="margin:0">No PDF: nome em destaque, quantidade à direita, posologia embaixo.</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function pad2(n){ return String(n).padStart(2,'0'); }
    function todayBR(){
      const d = new Date();
      return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`;
    }
    function escapeHtml(s){
      return (s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    const medListEl = document.getElementById('medList');
    const meds = [];

    function makeMed(){ return { nome:'', quantidade:'', posologia:'' }; }

    function renderMeds(){
      medListEl.innerHTML = '';
      meds.forEach((m, idx) => {
        const wrap = document.createElement('div');
        wrap.className = 'medItem';

        wrap.innerHTML = `
          <div class="medTop">
            <div style="display:flex; gap:10px; align-items:center;">
              <div class="medIdx">${idx+1}</div>
              <div style="font-weight:800">Medicamento ${idx+1}</div>
            </div>
            <button class="medRemove" type="button">Remover</button>
          </div>

          <div class="row" style="margin-top:10px;">
            <div>
              <label>Nome (com concentração)</label>
              <input placeholder="Ex.: Amoxicilina 500mg" value="${escapeHtml(m.nome)}" />
            </div>
            <div>
              <label>Quantidade</label>
              <input placeholder="Ex.: 21 cápsulas" value="${escapeHtml(m.quantidade)}" />
            </div>
          </div>

          <label style="margin-top:10px;">Posologia</label>
          <textarea placeholder="Ex.: Tomar 01 cápsula a cada 08 horas por 07 dias">${escapeHtml(m.posologia)}</textarea>
        `;

        const inputs = wrap.querySelectorAll('input');
        const ta = wrap.querySelector('textarea');
        const btnRemove = wrap.querySelector('.medRemove');

        inputs[0].addEventListener('input', e => { meds[idx].nome = e.target.value; });
        inputs[1].addEventListener('input', e => { meds[idx].quantidade = e.target.value; });
        ta.addEventListener('input', e => { meds[idx].posologia = e.target.value; });

        btnRemove.addEventListener('click', () => {
          meds.splice(idx, 1);
          renderMeds();
        });

        medListEl.appendChild(wrap);
      });
    }

    const usoSeg = document.getElementById('usoSeg');
    usoSeg.addEventListener('click', (ev) => {
      const pill = ev.target.closest('.pill');
      if(!pill) return;
      usoSeg.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      pill.querySelector('input').checked = true;
    });

    document.getElementById('data').value = todayBR();
    meds.push(makeMed()); meds.push(makeMed()); meds.push(makeMed());
    renderMeds();

    document.getElementById('btnAddMed').addEventListener('click', () => {
      meds.push(makeMed());
      renderMeds();
      medListEl.lastElementChild?.scrollIntoView({behavior:'smooth', block:'start'});
    });

    function collectData(){
      const paciente = document.getElementById('paciente').value.trim();
      const end1 = document.getElementById('end1').value.trim();
      const end2 = document.getElementById('end2').value.trim();
      const uso = document.querySelector('input[name="uso"]:checked')?.value || 'Uso Interno';
      const assinatura = document.getElementById('assinatura').value.trim();
      const data = document.getElementById('data').value.trim() || todayBR();

      const medsClean = meds
        .map(m => ({ nome:(m.nome||'').trim(), quantidade:(m.quantidade||'').trim(), posologia:(m.posologia||'').trim() }))
        .filter(m => m.nome || m.quantidade || m.posologia);

      return { paciente, end1, end2, uso, assinatura, data, meds: medsClean };
    }

    function buildPreviewHTML(payload){
      const pages = ['1ª VIA FARMÁCIA', '2ª VIA PACIENTE'].map((label) => {
        const medsHtml = (payload.meds.length ? payload.meds : [{nome:'', quantidade:'', posologia:''}])
          .map(m => `
            <div class="rxMed">
              <div class="rxMedLine">
                <div>${escapeHtml(m.nome || ' ')}</div>
                <div class="rxMedQty">${escapeHtml(m.quantidade || ' ')}</div>
              </div>
              <div class="rxPos">${escapeHtml(m.posologia || ' ')}</div>
            </div>
          `).join('');

        return `
          <div class="paper ${label === '1ª VIA FARMÁCIA' ? 'pageBreak' : ''}">
            <div class="rxTopRight">${label}</div>
            <div class="rxTitle">Receituário controle especial</div>

            <div class="rxPatient">
              <div>Paciente: ${escapeHtml(payload.paciente || '')}</div>
              <div>${escapeHtml(payload.end1 || '')}</div>
              <div>${escapeHtml(payload.end2 || '')}</div>
            </div>

            <div class="rxUso">${escapeHtml(payload.uso || 'Uso Interno')}</div>

            ${medsHtml}

            <div class="rxSignLine"></div>
            <div class="rxSigner">${escapeHtml(payload.assinatura || '')}</div>
            <div class="rxDate">${escapeHtml(payload.data || '')}</div>

            <div class="rxBox">
              <div class="rxBoxHead">
                <div>IDENTIFICAÇÃO DO COMPRADOR</div>
                <div>IDENTIFICAÇÃO DO FORNECEDOR</div>
              </div>

              <div class="rxBoxBody">
                <div class="rxBoxCol">
                  <div class="rxField">Nome: <span class="rxLine"></span></div>
                  <div class="rxField">&nbsp;</div>
                  <div class="rxField">Ident: <span class="rxLineShort rxLine"></span> &nbsp; Órg. Emissor: <span class="rxLineShort rxLine"></span></div>
                  <div class="rxField">End: <span class="rxLine"></span></div>
                  <div class="rxField">&nbsp;</div>
                  <div class="rxField">Cidade: <span class="rxLineShort rxLine" style="width:55%"></span> &nbsp; UF: <span class="rxLineShort rxLine"></span></div>
                  <div class="rxField">Telefone: <span class="rxLine" style="width:70%"></span></div>
                </div>

                <div class="rxBoxCol rxFooterFarm">
                  <div class="rxFarmSign">
                    <div>ASSINATURA DO FARMACÊUTICO</div>
                    <div>DATA: ___/___/___</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      return `
        <!doctype html>
        <html lang="pt-br">
        <head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width,initial-scale=1" />
          <title>Visualização do receituário</title>
          <style>${document.querySelector('style').innerHTML}</style>
          <style>
            body{background:#eaeaea; margin:0; padding:24px; font-family: Arial, Helvetica, sans-serif;}
            .paper{box-shadow: 0 18px 40px rgba(0,0,0,.18); margin-bottom:24px;}
          </style>
        </head>
        <body>${pages}</body>
        </html>
      `;
    }

    function openPreview(payload){
      const w = window.open('', '_blank');
      if(!w){ alert('Pop-up bloqueado. Libere pop-ups para visualizar.'); return; }
      w.document.open();
      w.document.write(buildPreviewHTML(payload));
      w.document.close();
    }

    document.getElementById('btnPreview').addEventListener('click', () => {
      openPreview(collectData());
    });

    function drawBottomBox(doc, x, y, w, h){
      doc.rect(x, y, w, h);
      const headH = 10;
      doc.line(x, y + headH, x + w, y + headH);
      doc.line(x + w/2, y, x + w/2, y + h);

      doc.setFont('helvetica','bold');
      doc.setFontSize(12);
      doc.text('IDENTIFICAÇÃO DO COMPRADOR', x + (w/4), y + 7, {align:'center'});
      doc.text('IDENTIFICAÇÃO DO FORNECEDOR', x + (3*w/4), y + 7, {align:'center'});

      doc.setFont('helvetica','normal');
      doc.setFontSize(10);

      const leftX = x + 4;
      let cy = y + headH + 8;

      doc.text('Nome:', leftX, cy);
      doc.line(leftX + 18, cy + 1, x + (w/2) - 6, cy + 1);
      cy += 10;
      doc.line(leftX, cy - 2, x + (w/2) - 6, cy - 2);
      cy += 10;

      doc.text('Ident:', leftX, cy);
      doc.line(leftX + 14, cy + 1, leftX + 14 + 35, cy + 1);
      doc.text('Órg. Emissor:', leftX + 54, cy);
      doc.line(leftX + 82, cy + 1, x + (w/2) - 6, cy + 1);
      cy += 12;

      doc.text('End:', leftX, cy);
      doc.line(leftX + 12, cy + 1, x + (w/2) - 6, cy + 1);
      cy += 10;
      doc.line(leftX, cy + 1, x + (w/2) - 6, cy + 1);
      cy += 12;

      doc.text('Cidade:', leftX, cy);
      doc.line(leftX + 18, cy + 1, leftX + 18 + 55, cy + 1);
      doc.text('UF:', leftX + 78, cy);
      doc.line(leftX + 88, cy + 1, x + (w/2) - 6, cy + 1);
      cy += 12;

      doc.text('Telefone:', leftX, cy);
      doc.line(leftX + 22, cy + 1, x + (w/2) - 6, cy + 1);

      const rightX = x + (w/2) + 4;
      const bottomY = y + h - 6;
      doc.setFontSize(9);
      doc.text('ASSINATURA DO FARMACÊUTICO', rightX, bottomY);
      doc.text('DATA: ___/___/___', x + w - 4, bottomY, {align:'right'});
    }

    function addWrappedText(doc, text, x, y, maxWidth, lineHeight){
      const lines = doc.splitTextToSize(text, maxWidth);
      doc.text(lines, x, y);
      return y + (lines.length * lineHeight);
    }

    function drawOnePage(doc, payload, viaLabel){
      const pageW = doc.internal.pageSize.getWidth();
      const rightX = pageW - 22;
      const marginX = 22;
      let y = 18;

      doc.setFont('helvetica','bold');
      doc.setFontSize(12);
      doc.text(viaLabel, rightX, y, {align:'right'});

      y = 68;
      doc.setFontSize(22);
      doc.text('Receituário controle especial', pageW/2, y, {align:'center'});

      y = 86;
      doc.setFont('helvetica','normal');
      doc.setFontSize(14);
      doc.text(`Paciente: ${payload.paciente || ''}`, marginX, y);

      y += 7; doc.text(payload.end1 || '', marginX, y);
      y += 7; doc.text(payload.end2 || '', marginX, y);

      y += 16;
      doc.setTextColor(120);
      doc.text(payload.uso || 'Uso Interno', marginX, y);
      doc.setTextColor(0);

      y += 12;

      const medsLocal = payload.meds.length ? payload.meds : [{nome:'', quantidade:'', posologia:''}];

      for(const m of medsLocal){
        if(y > 178) break; // evita invadir assinatura/caixa
        doc.setFont('helvetica','bold');
        doc.setFontSize(15);
        doc.text(((m.nome || ' ').trim() || ' '), marginX, y);

        doc.setFont('helvetica','normal');
        doc.setFontSize(15);
        doc.text(((m.quantidade || ' ').trim() || ' '), rightX, y, {align:'right'});

        y += 9;
        doc.setFontSize(14);
        y = addWrappedText(doc, ((m.posologia || ' ').trim() || ' '), marginX, y, pageW - (marginX*2), 6);
        y += 10;
      }

      const signY = 205;
      doc.line(marginX, signY, rightX, signY);
      doc.setFontSize(14);
      doc.text(payload.assinatura || '', pageW/2, signY + 9, {align:'center'});
      doc.text(payload.data || '', pageW/2, signY + 16, {align:'center'});

      drawBottomBox(doc, marginX, 230, pageW - (marginX*2), 56);
    }

    async function generatePdf(payload){
      if(!window.jspdf || !window.jspdf.jsPDF){
        openPreview(payload);
        alert('Não carregou a biblioteca de PDF. Abri a visualização.');
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({orientation:'p', unit:'mm', format:'a4'});

      drawOnePage(doc, payload, '1ª VIA FARMÁCIA');
      doc.addPage();
      drawOnePage(doc, payload, '2ª VIA PACIENTE');

      const safeName = (payload.paciente || 'paciente').replace(/[^a-zA-Z0-9 _-]/g,'').trim().replace(/\s+/g,'_');
      doc.save(`receituario_${safeName || 'paciente'}.pdf`);
    }

    document.getElementById('btnPdf').addEventListener('click', async () => {
      const payload = collectData();
      if(!payload.paciente){ alert('Preencha o nome do paciente.'); return; }
      await generatePdf(payload);
    });
  </script>
</body>
</html>
