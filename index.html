<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simulador de Receituário (Cruzeiro do Sul)</title>

  <!-- jsPDF -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
  .top{
    display:flex;
    flex-direction:column;
    align-items:right;
    text-align:center;
    gap:10px;
    margin-bottom:16px;
  }

  .brand{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
  }

  .actions{
    display:flex;
    justify-content:center;
    width:100%;
  }

  .titleBlock h1{
    margin:0;
  }

  .prop{
    font-size:12px;      /* aqui controla o tamanho */
    color:#a7b0c3;
    font-weight:700;
    margin-top:4px;
  }
  
    :root{
      --bg:#0b0c10;
      --ink:#eef2ff;
      --muted:#a7b0c3;
      --stroke:rgba(255,255,255,.10);
      --glass:rgba(255,255,255,.06);
      --glass2:rgba(255,255,255,.03);
      --brand1: rgba(245,158,11,.95);
      --brand2: rgba(37,99,235,.90);
      --paper:#ffffff;
      --paperInk:#111;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(1200px 700px at 20% -10%, rgba(245,158,11,.14), transparent 60%),
        radial-gradient(900px 600px at 110% 20%, rgba(37,99,235,.18), transparent 55%),
        radial-gradient(900px 600px at 20% 110%, rgba(124,58,237,.12), transparent 60%),
        var(--bg);
      color:var(--ink);
    }

    .wrap{max-width:1120px; margin:0 auto; padding:24px;}
    .top{display:flex; gap:16px; align-items:flex-start; justify-content:space-between; margin-bottom:16px;}
    .brand{display:flex; gap:14px; align-items:center;}

    .logoWrap{
      width:56px; height:56px; border-radius:18px;
      background: linear-gradient(135deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      border:1px solid rgba(255,255,255,.10);
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
      display:grid; place-items:center;
      overflow:hidden;
    }
    .logoWrap img{width:88%; height:auto; display:block; filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));}
    h1{margin:0; font-size:18px; line-height:1.2;}
    .sub{margin:4px 0 0 0; color:#a7b0c3; font-size:13px; max-width:700px; line-height:1.35;}

    .actions{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
    .btn{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color:#eef2ff;
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:800;
      letter-spacing:.2px;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
      user-select:none;
      display:inline-flex; gap:8px; align-items:center;
      white-space:nowrap;
      box-shadow: 0 10px 26px rgba(0,0,0,.18);
    }
    .btn:hover{background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.16);}
    .btn:active{transform: translateY(1px);}
    .btn.primary{background: linear-gradient(135deg, rgba(245,158,11,.95), rgba(37,99,235,.90)); border-color: rgba(255,255,255,.16);}

    .grid{display:grid; grid-template-columns: 1.05fr .95fr; gap:14px;}
    @media (max-width: 980px){ .grid{grid-template-columns:1fr;} }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
      border-radius:20px;
      padding:14px;
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
      backdrop-filter: blur(10px);
    }
    .card h2{margin:0 0 10px 0; font-size:14px; letter-spacing:.2px;}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    @media (max-width: 600px){ .row{grid-template-columns:1fr;} }

    label{display:block; font-size:12px; color:#a7b0c3; margin:8px 0 6px;}
    input, textarea, select{
      width:100%;
      padding:10px 11px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.22);
      color:#eef2ff;
      outline: none;
    }
    input:focus, textarea:focus, select:focus{border-color: rgba(245,158,11,.45);}
    textarea{min-height:82px; resize:vertical;}

    .medList{display:flex; flex-direction:column; gap:10px;}
    .medItem{background: rgba(0,0,0,.18); border:1px solid rgba(255,255,255,.10); border-radius:18px; padding:12px;}
    .medTop{display:flex; gap:10px; align-items:center; justify-content:space-between;}
    .medIdx{font-weight:900; background: rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.10); width:34px; height:34px; border-radius:12px; display:grid; place-items:center;}
    .medRemove{border:none; background: rgba(239,68,68,.14); color: rgba(255,255,255,.92); padding:8px 10px; border-radius:12px; cursor:pointer; font-weight:900;}
    .medRemove:hover{background: rgba(239,68,68,.18);}
    .mutedSmall{font-size:12px; color:#a7b0c3; margin-top:10px; line-height:1.35;}
    .addRow{margin-top:10px; display:flex; gap:10px; align-items:center; justify-content:space-between; flex-wrap:wrap;}
    .btnAdd{border:1px dashed rgba(255,255,255,.18); background: rgba(255,255,255,.04); padding:10px 12px; border-radius:14px; cursor:pointer; font-weight:900; color:#eef2ff;}
    .btnAdd:hover{background: rgba(255,255,255,.07);}

    /* Preview “papel” */
    .paper{width: 210mm; min-height: 297mm; background: #fff; color:#111; margin: 0 auto; padding: 14mm 18mm 14mm 18mm; font-family: Arial, Helvetica, sans-serif;}
    .pageBreak{page-break-after: always;}
    .rxHeader{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:8mm;}
    .rxLogo{width:62mm; height:auto;}
    .rxTopRight{font-weight:700; font-size:12px; text-align:right; margin-top:2mm;}
    .rxTitle{font-size:22px; font-weight:700; text-align:center; margin:10mm 0 10mm;}
    .rxPatient{font-size:14px; line-height:1.35; margin:0 0 10mm 0;}
    .rxUso{color:#666; font-size:14px; margin:0 0 6mm 0;}
    .rxMed{margin:0 0 9mm 0;}
    .rxMedLine{display:flex; gap:10px; justify-content:space-between; align-items:flex-end; font-size:16px; font-weight:700;}
    .rxMedQty{font-weight:400;}
    .rxPos{font-size:16px; margin:6mm 0 0 0; line-height:1.25;}
    .rxSignLine{border-top:1px solid #111; margin:26mm 0 6mm;}
    .rxSigner{font-size:16px; text-align:center;}
    .rxDate{font-size:16px; text-align:center; margin-top:2mm;}
    .rxBox{margin-top:10mm; border:1px solid #111;}
    .rxBoxHead{display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid #111; font-weight:700; text-align:center; padding:6px 0;}
    .rxBoxBody{display:grid; grid-template-columns:1fr 1fr; min-height:46mm;}
    .rxBoxCol{padding:8px 10px; border-right:1px solid #111;}
    .rxBoxCol:last-child{border-right:none;}
    .rxField{font-size:12px; margin:8px 0;}
    .rxLine{border-bottom:1px solid #111; display:inline-block; width:80%; height:10px; vertical-align:bottom;}
    .rxLineShort{width:35%}
    .rxFooterFarm{position:relative; min-height:46mm;}
    .rxFarmSign{position:absolute; left:10px; right:10px; bottom:8px; display:flex; justify-content:space-between; font-size:10px; gap:10px;}
  
    /* ===== Ajuste: logo mais visível na tela (não altera o PDF) ===== */
    .logoWrap{
      width: 64px !important;
      height: 64px !important;
      border-radius: 20px !important;
      background: #ffffff !important;
      border: 1px solid rgba(0,0,0,.14) !important;
      box-shadow: 0 18px 50px rgba(0,0,0,.45) !important;
    }
    .logoWrap img{
      width: 92% !important;
      height: auto !important;
      filter: none !important; /* remove o escurecimento */
    }

  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="logoWrap" title="Universidade Cruzeiro do Sul">
          <img src="https://logospng.org/download/cruzeiro-do-sul/logo-cruzeiro-do-sul-4096.png" alt="Logo Universidade Cruzeiro do Sul" />
        </div>
        <div>
          <h1>Simulador de Receituário (Cruzeiro do Sul)</h1>
          <div class="prop"> Propriedade de prof. Me. Fernando H. Martins - © Copyright 2026</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="btnPreview">👀 Visualizar</button>
        <button class="btn primary" id="btnPdf">📄 Salvar PDF</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Dados do paciente</h2>

        <label for="paciente">Nome do paciente</label>
        <input id="paciente" autocomplete="off" />

        <label for="end1">Endereço (linha 1)</label>
        <input id="end1" autocomplete="off" />

        <label for="end2">Endereço (linha 2)</label>
        <input id="end2" autocomplete="off" />

        <div class="row" style="margin-top:10px;">
          <div>
            <label for="usoSelect">Uso</label>
            <select id="usoSelect">
              <option value="Uso Interno">Uso Interno</option>
              <option value="Uso Externo">Uso Externo</option>
              <option value="Uso Colutório">Uso Colutório</option>
              <option value="Uso Tópico">Uso Tópico</option>
              <option value="Uso Sublingual">Uso Sublingual</option>
              <option value="Uso Intranasal">Uso Intranasal</option>
              <option value="Uso Inalatório">Uso Inalatório</option>
              <option value="Uso Oftálmico">Uso Oftálmico</option>
              <option value="Uso Otológico">Uso Otológico</option>
              <option value="Uso Retal">Uso Retal</option>
              <option value="Uso Vaginal">Uso Vaginal</option>
              <option value="Uso Intramuscular">Uso Intramuscular</option>
              <option value="Uso Intravenoso">Uso Intravenoso</option>
              <option value="Uso Subcutâneo">Uso Subcutâneo</option>
              <option value="Uso Intradérmico">Uso Intradérmico</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
          <div>
            <label for="usoOutro">Se “Outro”, descreva</label>
            <input id="usoOutro" autocomplete="off" />
          </div>
        </div>

        <div class="row" style="margin-top:10px;">
          <div>
            <label for="assinatura">Assinatura (nome do aluno)</label>
            <input id="assinatura" autocomplete="off" />
          </div>
          <div>
            <label for="data">Data</label>
            <input id="data" placeholder="dd/mm/aaaa" autocomplete="off" />
          </div>
        </div>

        <p class="mutedSmall">A posologia sai exatamente como foi escrita. Sem “corrigir”, sem abreviar.</p>
      </div>

      <div class="card">
        <h2>Medicamentos</h2>
        <div class="medList" id="medList"></div>

        <div class="addRow">
          <button class="btnAdd" id="btnAddMed">＋ Adicionar medicamento</button>
          <span class="mutedSmall" style="margin:0">No PDF: nome em destaque, quantidade à direita, posologia embaixo.</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const LOGO_URL = "https://logospng.org/download/cruzeiro-do-sul/logo-cruzeiro-do-sul-4096.png";

    function pad2(n){ return String(n).padStart(2,'0'); }
    function todayBR(){
      const d = new Date();
      return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`;
    }
    function escapeHtml(s){
      return (s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    const medListEl = document.getElementById('medList');
    const meds = [];

    function makeMed(){ return { nome:'', quantidade:'', posologia:'' }; }

    function renderMeds(){
      medListEl.innerHTML = '';
      meds.forEach((m, idx) => {
        const wrap = document.createElement('div');
        wrap.className = 'medItem';

        wrap.innerHTML = `
          <div class="medTop">
            <div style="display:flex; gap:10px; align-items:center;">
              <div class="medIdx">${idx+1}</div>
              <div style="font-weight:900">Medicamento ${idx+1}</div>
            </div>
            <button class="medRemove" type="button">Remover</button>
          </div>

          <div class="row" style="margin-top:10px;">
            <div>
              <label>Nome (com concentração)</label>
              <input value="${escapeHtml(m.nome)}" autocomplete="off" />
            </div>
            <div>
              <label>Quantidade</label>
              <input value="${escapeHtml(m.quantidade)}" autocomplete="off" />
            </div>
          </div>

          <label style="margin-top:10px;">Posologia</label>
          <textarea autocomplete="off">${escapeHtml(m.posologia)}</textarea>
        `;

        const inputs = wrap.querySelectorAll('input');
        const ta = wrap.querySelector('textarea');
        const btnRemove = wrap.querySelector('.medRemove');

        inputs[0].addEventListener('input', e => { meds[idx].nome = e.target.value; });
        inputs[1].addEventListener('input', e => { meds[idx].quantidade = e.target.value; });
        ta.addEventListener('input', e => { meds[idx].posologia = e.target.value; });

        btnRemove.addEventListener('click', () => {
          meds.splice(idx, 1);
          renderMeds();
        });

        medListEl.appendChild(wrap);
      });
    }

    document.getElementById('data').value = todayBR();
    meds.push(makeMed()); meds.push(makeMed()); meds.push(makeMed());
    renderMeds();

    document.getElementById('btnAddMed').addEventListener('click', () => {
      meds.push(makeMed());
      renderMeds();
      medListEl.lastElementChild?.scrollIntoView({behavior:'smooth', block:'start'});
    });

    function collectData(){
      const paciente = document.getElementById('paciente').value.trim();
      const end1 = document.getElementById('end1').value.trim();
      const end2 = document.getElementById('end2').value.trim();

      const usoSel = document.getElementById('usoSelect').value;
      const usoOutro = document.getElementById('usoOutro').value.trim();
      const uso = (usoSel === 'Outro' && usoOutro) ? usoOutro : usoSel;

      const assinatura = document.getElementById('assinatura').value.trim();
      const data = document.getElementById('data').value.trim() || todayBR();

      const medsClean = meds
        .map(m => ({ nome:(m.nome||'').trim(), quantidade:(m.quantidade||'').trim(), posologia:(m.posologia||'').trim() }))
        .filter(m => m.nome || m.quantidade || m.posologia);

      return { paciente, end1, end2, uso, assinatura, data, meds: medsClean };
    }

    function buildPreviewHTML(payload){
      const pages = ['1ª VIA FARMÁCIA', '2ª VIA PACIENTE'].map((label) => {
        const medsHtml = (payload.meds.length ? payload.meds : [{nome:'', quantidade:'', posologia:''}])
          .map(m => `
            <div class="rxMed">
              <div class="rxMedLine">
                <div>${escapeHtml(m.nome || ' ')}</div>
                <div class="rxMedQty">${escapeHtml(m.quantidade || ' ')}</div>
              </div>
              <div class="rxPos">${escapeHtml(m.posologia || ' ')}</div>
            </div>
          `).join('');

        return `
          <div class="paper ${label === '1ª VIA FARMÁCIA' ? 'pageBreak' : ''}">
            <div class="rxHeader">
              <img class="rxLogo" src="${LOGO_URL}" alt="Logo Universidade Cruzeiro do Sul" />
              <div class="rxTopRight">${label}</div>
            </div>

            <div class="rxTitle">Receituário controle especial</div>

            <div class="rxPatient">
              <div>Paciente: ${escapeHtml(payload.paciente || '')}</div>
              <div>${escapeHtml(payload.end1 || '')}</div>
              <div>${escapeHtml(payload.end2 || '')}</div>
            </div>

            <div class="rxUso">${escapeHtml(payload.uso || 'Uso Interno')}</div>

            ${medsHtml}

            <div class="rxSignLine"></div>
            <div class="rxSigner">${escapeHtml(payload.assinatura || '')}</div>
            <div class="rxDate">${escapeHtml(payload.data || '')}</div>

            <div class="rxBox">
              <div class="rxBoxHead">
                <div>IDENTIFICAÇÃO DO COMPRADOR</div>
                <div>IDENTIFICAÇÃO DO FORNECEDOR</div>
              </div>

              <div class="rxBoxBody">
                <div class="rxBoxCol">
                  <div class="rxField">Nome: <span class="rxLine"></span></div>
                  <div class="rxField">&nbsp;</div>
                  <div class="rxField">Ident: <span class="rxLineShort rxLine"></span> &nbsp; Órg. Emissor: <span class="rxLineShort rxLine"></span></div>
                  <div class="rxField">End: <span class="rxLine"></span></div>
                  <div class="rxField">&nbsp;</div>
                  <div class="rxField">Cidade: <span class="rxLineShort rxLine" style="width:55%"></span> &nbsp; UF: <span class="rxLineShort rxLine"></span></div>
                  <div class="rxField">Telefone: <span class="rxLine" style="width:70%"></span></div>
                </div>

                <div class="rxBoxCol rxFooterFarm">
                  <div class="rxFarmSign">
                    <div>ASSINATURA DO FARMACÊUTICO</div>
                    <div>DATA: ___/___/___</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      return `
        <!doctype html>
        <html lang="pt-br">
        <head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width,initial-scale=1" />
          <title>Visualização do receituário</title>
          <style>${document.querySelector('style').innerHTML}</style>
          <style>
            body{background:#eaeaea; margin:0; padding:24px; font-family: Arial, Helvetica, sans-serif;}
            .paper{box-shadow: 0 18px 40px rgba(0,0,0,.18); margin-bottom:24px;}
          </style>
        </head>
        <body>${pages}</body>
        </html>
      `;
    }

    function openPreview(payload){
      const w = window.open('', '_blank');
      if(!w){ alert('Pop-up bloqueado. Libere pop-ups para visualizar.'); return; }
      w.document.open();
      w.document.write(buildPreviewHTML(payload));
      w.document.close();
    }

    document.getElementById('btnPreview').addEventListener('click', () => {
      openPreview(collectData());
    });

    // ===== PDF com logo =====
    let _logoCache = null;

    function blobToDataURL(blob){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function loadLogo(){
      if(_logoCache) return _logoCache;
      try{
        const res = await fetch(LOGO_URL, { mode:'cors' });
        const blob = await res.blob();
        const dataUrl = await blobToDataURL(blob);

        const img = new Image();
        img.src = dataUrl;
        if(img.decode) {
          try { await img.decode(); } catch { /* ok */ }
        } else {
          await new Promise(r => img.onload = r);
        }

        _logoCache = { dataUrl, w: img.naturalWidth || 1000, h: img.naturalHeight || 300 };
        return _logoCache;
      }catch(e){
        _logoCache = null;
        return null;
      }
    }

    function drawBottomBox(doc, x, y, w, h){
      doc.rect(x, y, w, h);
      const headH = 10;
      doc.line(x, y + headH, x + w, y + headH);
      doc.line(x + w/2, y, x + w/2, y + h);

      doc.setFont('helvetica','bold');
      doc.setFontSize(12);
      doc.text('IDENTIFICAÇÃO DO COMPRADOR', x + (w/4), y + 7, {align:'center'});
      doc.text('IDENTIFICAÇÃO DO FORNECEDOR', x + (3*w/4), y + 7, {align:'center'});

      doc.setFont('helvetica','normal');
      doc.setFontSize(10);

      const leftX = x + 4;
      let cy = y + headH + 8;

      doc.text('Nome:', leftX, cy);
      doc.line(leftX + 18, cy + 1, x + (w/2) - 6, cy + 1);
      cy += 10;
      doc.line(leftX, cy - 2, x + (w/2) - 6, cy - 2);
      cy += 10;

      doc.text('Ident:', leftX, cy);
      doc.line(leftX + 14, cy + 1, leftX + 14 + 35, cy + 1);
      doc.text('Órg. Emissor:', leftX + 54, cy);
      doc.line(leftX + 82, cy + 1, x + (w/2) - 6, cy + 1);
      cy += 12;

      doc.text('End:', leftX, cy);
      doc.line(leftX + 12, cy + 1, x + (w/2) - 6, cy + 1);
      cy += 10;
      doc.line(leftX, cy + 1, x + (w/2) - 6, cy + 1);
      cy += 12;

      doc.text('Cidade:', leftX, cy);
      doc.line(leftX + 18, cy + 1, leftX + 18 + 55, cy + 1);
      doc.text('UF:', leftX + 78, cy);
      doc.line(leftX + 88, cy + 1, x + (w/2) - 6, cy + 1);
      cy += 12;

      doc.text('Telefone:', leftX, cy);
      doc.line(leftX + 22, cy + 1, x + (w/2) - 6, cy + 1);

      const rightX = x + (w/2) + 4;
      const bottomY = y + h - 6;
      doc.setFontSize(9);
      doc.text('ASSINATURA DO FARMACÊUTICO', rightX, bottomY);
      doc.text('DATA: ___/___/___', x + w - 4, bottomY, {align:'right'});
    }

    function addWrappedText(doc, text, x, y, maxWidth, lineHeight){
      const lines = doc.splitTextToSize(text, maxWidth);
      doc.text(lines, x, y);
      return y + (lines.length * lineHeight);
    }

    function drawOnePage(doc, payload, viaLabel, logo){
      const pageW = doc.internal.pageSize.getWidth();
      const rightX = pageW - 22;
      const marginX = 22;

      doc.setFont('helvetica','bold');
      doc.setFontSize(12);
      doc.text(viaLabel, rightX, 16, {align:'right'});

      if(logo && logo.dataUrl){
        const desiredW = 62;
        const desiredH = desiredW * (logo.h / logo.w);
        doc.addImage(logo.dataUrl, 'PNG', marginX, 10, desiredW, desiredH);
      } else {
        doc.setFont('helvetica','bold');
        doc.setFontSize(14);
        doc.text('Universidade Cruzeiro do Sul', marginX, 18);
      }

      doc.setFont('helvetica','bold');
      doc.setFontSize(22);
      doc.text('Receituário controle especial', pageW/2, 68, {align:'center'});

      let y = 86;
      doc.setFont('helvetica','normal');
      doc.setFontSize(14);
      doc.text(`Paciente: ${payload.paciente || ''}`, marginX, y);

      y += 7; doc.text(payload.end1 || '', marginX, y);
      y += 7; doc.text(payload.end2 || '', marginX, y);

      y += 16;
      doc.setTextColor(120);
      doc.text(payload.uso || 'Uso Interno', marginX, y);
      doc.setTextColor(0);

      y += 12;
      const medsLocal = payload.meds.length ? payload.meds : [{nome:'', quantidade:'', posologia:''}];

      for(const m of medsLocal){
        if(y > 178) break;
        doc.setFont('helvetica','bold');
        doc.setFontSize(15);
        doc.text(((m.nome || ' ').trim() || ' '), marginX, y);

        doc.setFont('helvetica','normal');
        doc.setFontSize(15);
        doc.text(((m.quantidade || ' ').trim() || ' '), rightX, y, {align:'right'});

        y += 9;
        doc.setFontSize(14);
        y = addWrappedText(doc, ((m.posologia || ' ').trim() || ' '), marginX, y, pageW - (marginX*2), 6);
        y += 10;
      }

      const signY = 205;
      doc.line(marginX, signY, rightX, signY);
      doc.setFontSize(14);
      doc.text(payload.assinatura || '', pageW/2, signY + 9, {align:'center'});
      doc.text(payload.data || '', pageW/2, signY + 16, {align:'center'});

      drawBottomBox(doc, marginX, 230, pageW - (marginX*2), 56);
    }

    async function generatePdf(payload){
      if(!window.jspdf || !window.jspdf.jsPDF){
        openPreview(payload);
        alert('Não carregou a biblioteca de PDF. Abri a visualização.');
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({orientation:'p', unit:'mm', format:'a4'});

      const logo = await loadLogo();
      drawOnePage(doc, payload, '1ª VIA FARMÁCIA', logo);
      doc.addPage();
      drawOnePage(doc, payload, '2ª VIA PACIENTE', logo);

      const safeName = (payload.paciente || 'paciente')
        .replace(/[^a-zA-Z0-9 _-]/g,'')
        .trim()
        .replace(/\s+/g,'_');

      doc.save(`receituario_${safeName || 'paciente'}.pdf`);
    }

    document.getElementById('btnPdf').addEventListener('click', async () => {
      const payload = collectData();
      if(!payload.paciente){ alert('Preencha o nome do paciente.'); return; }
      await generatePdf(payload);
    });
  </script>
</body>
</html>
